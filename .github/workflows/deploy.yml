name: Deploy Laravel to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cpanel-production-deploy
  cancel-in-progress: true

env:
  CPANEL_REPOSITORY_PATH: /home2/adlinafi/repositories/portfolio
  CPANEL_PUBLIC_PATH: /home2/adlinafi/public_html/adlinafiqh.com

jobs:
  git-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest code on cPanel and deploy
        uses: appleboy/ssh-action@v1.2.2
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          CPANEL_REPOSITORY_PATH: ${{ env.CPANEL_REPOSITORY_PATH }}
          CPANEL_PUBLIC_PATH: ${{ env.CPANEL_PUBLIC_PATH }}
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          port: ${{ secrets.CPANEL_PORT || 22 }}
          envs: GITHUB_REF_NAME,CPANEL_REPOSITORY_PATH,CPANEL_PUBLIC_PATH
          script: |
            set -e
            cd "$CPANEL_REPOSITORY_PATH"
            git checkout "$GITHUB_REF_NAME"
            git pull --ff-only origin "$GITHUB_REF_NAME"
            composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader
            php artisan optimize:clear
            mkdir -p "$CPANEL_PUBLIC_PATH"
            cp -R public/. "$CPANEL_PUBLIC_PATH"
